version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    # Mirror pnpm-workspace.yaml `minimumReleaseAge: 4320` so Dependabot
    # doesn't propose versions pnpm would refuse to install.
    cooldown:
      default-days: 3
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    groups:
      dev-deps:
        dependency-type: development
        update-types: [patch, minor]
      prod-deps:
        dependency-type: production
        update-types: [patch]

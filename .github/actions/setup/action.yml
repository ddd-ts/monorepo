name: "Setup"

description: "Checkout, install Node/npm/pnpm and dependencies"

runs:
  using: "composite"
  steps:
    - name: Cache turbo build setup
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: .turbo
        key: ${{ runner.os }}-turbo-${{ github.head_ref || github.ref }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-turbo-${{ github.head_ref || github.ref }}-

    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: 20
        registry-url: https://registry.npmjs.org/
        scope: "@ddd-ts"

    - name: Install npm
      shell: bash
      run: npm i -g npm@11

    - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
      with:
        version: 9

    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      name: Setup pnpm cache
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ github.head_ref || github.ref }}-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-${{ github.head_ref || github.ref }}-

    - name: Install dependencies
      shell: bash
      run: pnpm i --frozen-lockfile

    - name: Build
      shell: bash
      run: pnpm build
